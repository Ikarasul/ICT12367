<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกข้อมูลพนักงาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #06b6d4;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0b0b1a;
            --bg-card: #13132b;
            --bg-input: #0d0d1f;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(99, 102, 241, 0.18);
            --glow: rgba(99, 102, 241, 0.35);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 500px;
            height: 500px;
            top: -150px;
            left: -150px;
            background: rgba(99, 102, 241, 0.12);
            animation: blobA 15s ease-in-out infinite alternate;
        }

        body::after {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            background: rgba(6, 182, 212, 0.10);
            animation: blobA 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes blobA {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.1) translate(40px, 40px);
            }
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: .9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(11, 11, 26, .85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
            text-decoration: none;
        }

        .nav-brand span {
            color: var(--primary-light);
        }

        .nav-links {
            display: flex;
            gap: .5rem;
        }

        .nav-link {
            padding: .45rem 1rem;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: .875rem;
            font-weight: 500;
            transition: all .25s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(99, 102, 241, .15);
            color: var(--primary-light);
        }

        .nav-link i {
            margin-right: .3rem;
        }

        /* WRAPPER */
        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            margin-top: 5rem;
        }

        /* HEADER */
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeDown .6s ease both;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-icon {
            width: 76px;
            height: 76px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.1rem;
            box-shadow: 0 0 40px var(--glow);
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {

            0%,
            100% {
                box-shadow: 0 0 40px var(--glow);
            }

            50% {
                box-shadow: 0 0 65px rgba(99, 102, 241, .6);
            }
        }

        .header-icon i {
            font-size: 2.1rem;
            color: #fff;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e2e8f0 40%, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: .35rem;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: .95rem;
        }

        /* CARD */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem 2.5rem 2rem;
            box-shadow: 0 32px 80px rgba(0, 0, 0, .55), inset 0 1px 0 rgba(255, 255, 255, .04);
            animation: fadeUp .65s ease .1s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* PROGRESS */
        .progress-track {
            display: flex;
            gap: 6px;
            margin-bottom: 2rem;
        }

        .progress-seg {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: rgba(99, 102, 241, .12);
            transition: background .4s ease;
        }

        .progress-seg.filled {
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        /* ALERTS */
        .alert {
            display: flex;
            align-items: center;
            gap: .7rem;
            padding: .9rem 1.1rem;
            border-radius: 12px;
            font-size: .9rem;
            margin-bottom: 1.4rem;
            animation: fadeUp .4s ease both;
        }

        .alert-success {
            background: rgba(16, 185, 129, .1);
            border: 1px solid rgba(16, 185, 129, .25);
            color: #34d399;
        }

        .alert-error {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .25);
            color: #f87171;
        }

        /* FORM */
        .form-group {
            margin-bottom: 1.35rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: .45rem;
            font-size: .78rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: .5rem;
        }

        label i {
            color: var(--primary-light);
            font-size: .78rem;
        }

        .input-wrap {
            position: relative;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select {
            width: 100%;
            padding: .85rem 1rem .85rem 2.85rem;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Sarabun', sans-serif;
            font-size: .95rem;
            outline: none;
            transition: border-color .25s, box-shadow .25s;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
        }

        input::placeholder {
            color: rgba(148, 163, 184, .38);
        }

        select option {
            background: #1a1a35;
            color: var(--text);
        }

        .input-icon {
            position: absolute;
            left: .95rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: .85rem;
            pointer-events: none;
        }

        .select-chevron {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: .75rem;
            pointer-events: none;
        }

        /* SEPARATOR */
        .sep {
            position: relative;
            text-align: center;
            margin: 1.6rem 0;
        }

        .sep::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--border);
        }

        .sep span {
            position: relative;
            background: var(--bg-card);
            padding: 0 .75rem;
            color: var(--text-muted);
            font-size: .72rem;
            letter-spacing: .1em;
            text-transform: uppercase;
        }

        /* SUBMIT */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 13px;
            color: #fff;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
            position: relative;
            overflow: hidden;
            transition: transform .25s, box-shadow .25s;
            margin-top: .5rem;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .12), transparent);
            transition: left .55s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(99, 102, 241, .5);
        }

        .btn-submit:hover::after {
            left: 100%;
        }

        .btn-submit:disabled {
            opacity: .7;
            cursor: not-allowed;
            transform: none;
        }

        /* FOOTER */
        .card-footer {
            text-align: center;
            margin-top: 1.4rem;
            color: var(--text-muted);
            font-size: .8rem;
        }

        .card-footer a {
            color: var(--primary-light);
            text-decoration: none;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }

        /* PARTICLES */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .dot {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: rise var(--d, 9s) var(--dl, 0s) infinite ease-in;
        }

        @keyframes rise {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(.3);
            }

            10% {
                opacity: .6;
            }

            90% {
                opacity: .2;
            }

            100% {
                opacity: 0;
                transform: translateY(-10px) scale(1.4);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.75rem 1.25rem 1.5rem;
            }

            .page-header h1 {
                font-size: 1.6rem;
            }

            .navbar {
                padding: .75rem 1rem;
            }

            .nav-link span {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="particles" id="dots"></div>

    <nav class="navbar">
        <a href="/" class="nav-brand">
            <i class="fas fa-crow"></i>&nbsp;Lab7 <span>Raven</span>
        </a>
        <div class="nav-links">
            <a href="/form/" class="nav-link active"><i class="fas fa-user-plus"></i><span>บันทึกข้อมูล</span></a>
            <a href="/employees/" class="nav-link"><i class="fas fa-users"></i><span>รายชื่อ</span></a>
            <a href="/contact/" class="nav-link"><i class="fas fa-headset"></i><span>ติดต่อ</span></a>
        </div>
    </nav>

    <div class="wrapper">
        <div class="page-header">
            <div class="header-icon"><i class="fas fa-user-tie"></i></div>
            <h1>บันทึกข้อมูลพนักงาน</h1>
            <p>กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้อง</p>
        </div>

        <div class="card">
            <div class="progress-track">
                <div class="progress-seg" id="ps1"></div>
                <div class="progress-seg" id="ps2"></div>
                <div class="progress-seg" id="ps3"></div>
                <div class="progress-seg" id="ps4"></div>
            </div>

            {% if messages %}
            {% for msg in messages %}
            <div class="alert {% if msg.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">
                <i
                    class="fas {% if msg.tags == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i>
                {{ msg }}
            </div>
            {% endfor %}
            {% endif %}

            <form id="empForm" method="POST" action="" novalidate>
                {% csrf_token %}

                <div class="form-group">
                    <label for="fullName">
                        <i class="fas fa-user"></i> ชื่อ-นามสกุล
                    </label>
                    <div class="input-wrap">
                        <input type="text" id="fullName" name="fullName" value="{{ full_name|default:'' }}"
                            placeholder="กรุณาใส่ชื่อ-นามสกุล" required autocomplete="name">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="position">
                        <i class="fas fa-briefcase"></i> ตำแหน่งงาน
                    </label>
                    <div class="input-wrap">
                        <select id="position" name="position" required>
                            <option value="">-- เลือกตำแหน่ง --</option>
                            <option value="Manager">Manager</option>
                            <option value="Supervisor">Supervisor</option>
                            <option value="Staff">Staff</option>
                            <option value="Intern">Intern</option>
                        </select>
                        <i class="fas fa-briefcase input-icon"></i>
                        <i class="fas fa-chevron-down select-chevron"></i>
                    </div>
                </div>

                <div class="sep"><span>ข้อมูลติดต่อ</span></div>

                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> อีเมล
                    </label>
                    <div class="input-wrap">
                        <input type="email" id="email" name="email" value="{{ email|default:'' }}"
                            placeholder="example@company.com" required autocomplete="email">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">
                        <i class="fas fa-phone"></i> เบอร์โทรศัพท์
                    </label>
                    <div class="input-wrap">
                        <input type="tel" id="phone" name="phone" value="{{ phone|default:'' }}"
                            placeholder="0XX-XXX-XXXX" required autocomplete="tel">
                        <i class="fas fa-phone input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-paper-plane"></i> บันทึกข้อมูล
                </button>
            </form>

            <div class="card-footer">
                <i class="fas fa-shield-alt" style="color:var(--success);margin-right:4px"></i>
                ข้อมูลของท่านจะถูกเก็บรักษาอย่างปลอดภัย &nbsp;·&nbsp;
                <a href="/employees/"><i class="fas fa-users"></i> ดูรายชื่อพนักงาน</a>
            </div>
        </div>
    </div>

    <script>
        // Particles
        const wrap = document.getElementById('dots');
        for (let i = 0; i < 30; i++) {
            const el = document.createElement('div');
            const size = 1.5 + Math.random() * 3;
            el.className = 'dot';
            el.style.cssText = `left:${Math.random() * 100}%;width:${size}px;height:${size}px;background:${Math.random() > .5 ? '#818cf8' : '#67e8f9'};--d:${6 + Math.random() * 10}s;--dl:${Math.random() * 12}s;`;
            wrap.appendChild(el);
        }

        // Restore select value if POST failed
        const savedPos = "{{ position|default:'' }}";
        if (savedPos) {
            document.getElementById('position').value = savedPos;
        }

        // Progress bar
        const inputs = Array.from(document.querySelectorAll('input, select'));
        const segs = Array.from(document.querySelectorAll('.progress-seg'));
        function updateProgress() {
            let n = inputs.filter(e => e.value.trim()).length;
            segs.forEach((s, i) => s.classList.toggle('filled', i < n));
        }
        inputs.forEach(el => {
            el.addEventListener('input', updateProgress);
            el.addEventListener('change', updateProgress);
        });
        updateProgress();

        // Submit loading state
        document.getElementById('empForm').addEventListener('submit', function () {
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
            btn.disabled = true;
        });
    </script>
</body>

</html>
